name: OTEL CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push obs-app
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/obs-app:latest

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Minikube
        run: |
          kubectl apply --validate=false -f k8s/namespace.yaml
          kubectl apply --validate=false -f k8s/otel-collector.yaml
          kubectl apply --validate=false -f k8s/prometheus.yaml
          kubectl apply --validate=false -f k8s/grafana.yaml
          kubectl apply --validate=false -f k8s/app-deployment.yaml
          kubectl rollout restart deployment/obs-app -n OBS
